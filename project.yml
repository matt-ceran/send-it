name: SendIt

options:
  bundleIdPrefix: com.sendit
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"

targets:
  SendIt:
    type: application
    platform: iOS
    sources:
      - path: SendIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sendit.notebookpdf
        PRODUCT_NAME: SendIt
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Send It
        INFOPLIST_KEY_NSCameraUsageDescription: Send It uses the camera to scan your notebook pages into a PDF.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets:
        - SendItTests
        - SendItUITests

  SendItTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SendItTests
    dependencies:
      - target: SendIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sendit.notebookpdf.tests
        GENERATE_INFOPLIST_FILE: YES

  SendItUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SendItUITests
    dependencies:
      - target: SendIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sendit.notebookpdf.uitests
        GENERATE_INFOPLIST_FILE: YES
